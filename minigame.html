<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gauntlet — The Compendium</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Layout ── */
    .gauntlet-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 1fr 280px;
      grid-template-rows: auto 1fr;
      gap: 1rem;
      min-height: calc(100vh - 56px);
    }

    /* ── Top bar ── */
    .top-bar {
      grid-column: 1 / -1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .gp-display { display: flex; align-items: center; gap: 0.5rem; }
    .gp-icon { font-size: 1.5rem; }
    .gp-amount {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--gold-pale);
      transition: transform 0.15s;
      min-width: 2.5ch;
    }
    .gp-amount.bump { transform: scale(1.3); }
    .gp-label {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      line-height: 1;
    }
    .streak-wrap { margin-left: auto; display: flex; align-items: center; gap: 0.6rem; }
    .streak-label {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .streak-pips { display: flex; gap: 5px; }
    .pip {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1px solid var(--border);
      transition: background 0.2s, border-color 0.2s;
    }
    .pip.lit { background: #f39c12; border-color: #f39c12; }
    .pip.fire { animation: pipfire 0.4s ease; }
    @keyframes pipfire { 0%{transform:scale(1.6)} 100%{transform:scale(1)} }
    .diff-badge {
      font-family: var(--font-display);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text-muted);
    }
    .diff-badge.easy   { border-color: #3a7030; color: #5aaa50; }
    .diff-badge.medium { border-color: #7a5820; color: var(--gold); }
    .diff-badge.hard   { border-color: var(--red-dim); color: var(--red); }

    /* ── Main quiz area ── */
    .quiz-area { display: flex; flex-direction: column; gap: 1rem; }

    .timer-track {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--gold-dim);
      transition: width 0.1s linear, background 0.3s;
    }
    .timer-fill.danger { background: var(--red); }

    .q-card {
      background: var(--panel);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: 2rem 1.75rem 1.5rem;
      position: relative;
      overflow: hidden;
    }
    .q-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }
    .q-card.correct-flash { animation: flashGreen 0.5s ease; }
    .q-card.wrong-flash   { animation: flashRed 0.5s ease; }
    @keyframes flashGreen { 0%,100%{background:var(--panel)} 40%{background:rgba(58,112,48,0.3)} }
    @keyframes flashRed   { 0%,100%{background:var(--panel)} 40%{background:rgba(176,48,32,0.3)} }

    .q-count {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 0.75rem;
    }
    .q-text {
      font-size: 1.2rem;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 1.5rem;
    }
    .q-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }
    .opt-btn {
      text-align: left;
      padding: 0.75rem 1rem;
      font-family: var(--font-body);
      font-size: 1rem;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      background: var(--bg2);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      line-height: 1.4;
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--gold-dim); background: var(--bg3); }
    .opt-btn:active:not(:disabled) { transform: scale(0.98); }
    .opt-label {
      font-family: var(--font-display);
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold-dim);
      min-width: 1.2em;
      padding-top: 2px;
    }
    .opt-btn.correct { border-color: #3a7030; background: rgba(58,112,48,0.18); color: #7acc70; }
    .opt-btn.correct .opt-label { color: #7acc70; }
    .opt-btn.wrong   { border-color: var(--red-dim); background: rgba(176,48,32,0.18); color: var(--red); }
    .opt-btn.wrong .opt-label { color: var(--red); }
    .opt-btn:disabled { cursor: default; }

    .feedback-banner {
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      min-height: 1.4em;
      color: var(--text-dim);
      margin-top: 0.75rem;
    }
    .feedback-banner.correct-text { color: #5aaa50; }
    .feedback-banner.wrong-text   { color: var(--red); }
    .feedback-banner.timeout-text { color: var(--gold-dim); }

    /* Floating GP text */
    .float-gp {
      position: fixed;
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 700;
      pointer-events: none;
      z-index: 9999;
      animation: floatUp 1.2s ease forwards;
    }
    .float-gp.gain { color: #f3c44a; text-shadow: 0 0 10px rgba(243,196,74,0.6); }
    .float-gp.loss { color: var(--red); text-shadow: 0 0 10px rgba(176,48,32,0.5); }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-55px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.9); }
    }

    /* ── Shop ── */
    .shop-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      max-height: calc(100vh - 130px);
    }
    .shop-title {
      font-family: var(--font-display);
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 4px;
    }
    .shop-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .shop-item-top { display: flex; align-items: center; gap: 8px; }
    .shop-swatch { width: 28px; height: 28px; border-radius: 5px; flex-shrink: 0; }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-family: var(--font-display); font-size: 0.8rem; color: var(--gold-pale); }
    .shop-title-text { font-size: 0.7rem; font-style: italic; color: var(--text-muted); }
    .shop-cost { font-family: var(--font-display); font-size: 0.7rem; color: var(--gold); white-space: nowrap; flex-shrink: 0; }
    .buy-btn {
      font-size: 0.62rem;
      padding: 4px 10px;
      border-radius: 5px;
      width: 100%;
      font-family: var(--font-display);
      letter-spacing: 0.08em;
    }
    .buy-btn:not([disabled]):not(.owned):hover { border-color: var(--gold); color: var(--gold-pale); }
    .buy-btn[disabled]:not(.owned) { opacity: 0.45; cursor: not-allowed; }
    .buy-btn.owned { border-color: #3a6a30; color: #5aaa50; cursor: default; }

    /* ── End screen ── */
    .end-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 1.2rem;
      padding: 2rem;
    }
    .end-screen.show { display: flex; }
    .end-title { font-size: 2rem; color: var(--gold-pale); }
    .end-gp { font-family: var(--font-display); font-size: 3rem; color: var(--gold-pale); }
    .end-sub { color: var(--text-muted); font-style: italic; }

    /* ── Role badge ── */
    .role-badge {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      background: var(--panel); border: 1px solid var(--border2);
      border-radius: 20px; padding: 6px 14px;
      font-family: var(--font-display); font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); display: flex; align-items: center; gap: 8px; z-index: 200;
    }
    .role-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gold-dim); }
    .role-badge button { border: none; padding: 0; font-size: 0.65rem; color: var(--text-dim); }

    @media (max-width: 720px) {
      .gauntlet-wrap { grid-template-columns: 1fr; }
      .shop-panel { max-height: 260px; }
      .q-options { grid-template-columns: 1fr; }
      .diff-badge { display: none; }
    }
  </style>
</head>

    <span class="nav-logo">⚔ The Compendium</span>

  <div class="gauntlet-wrap">
    <!-- Top bar -->
    <div class="top-bar">
      <div class="gp-display">
        <span class="gp-icon">🪙</span>
        <div>
          <div class="gp-amount" id="gp-amount">0</div>

      <div class="streak-wrap">

          <div class="pip" id="pip-0"></div>

    <!-- Quiz area -->
    <div class="quiz-area" id="quiz-area">
      <div class="timer-track" id="timer-track">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
      <div class="q-card" id="q-card">

        <a href="home.html" style="color:var(--text-muted);font-size:0.85rem;">Back to Home</a>
      </div>
    </div>

    <!-- Shop panel -->
    <div class="shop-panel" id="shop-panel">
      <div class="shop-title">🏪 Colour Vault Shop</div>
      <div id="shop-items"></div>
    </div>
  </div>

  <div class="role-badge">
    <div class="role-dot" id="role-dot"></div>
    <span id="role-label">…</span>
    <button onclick="Auth.logout()">Log out</button>
  </div>

  <script src="auth.js"></script>
  <script>
    if (!Auth.require()) throw new Error('not logged in');

    const username = sessionStorage.getItem('dnd-username') || 'Player';
    const isDM = Auth.isDM();
    document.getElementById('role-label').textContent = username;
    if (isDM) document.getElementById('role-dot').style.background = '#c8943a';

    // ═══════════════════════════════════════════════════════
    // QUESTIONS
    // ═══════════════════════════════════════════════════════
    const ALL_QUESTIONS = [
      // EASY — 5 GP, no penalty
      { q: 'How many sides does a d20 have?',
        options: ['12', '20', '10', '8'], answer: 1, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'Which class uses Sneak Attack as a core feature?',
        options: ['Ranger', 'Rogue', 'Monk', 'Bard'], answer: 1, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'What ability score governs spellcasting for Wizards?',
        options: ['Wisdom', 'Charisma', 'Intelligence', 'Strength'], answer: 2, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'What die does a Fighter roll for Hit Points each level?',
        options: ['d6', 'd8', 'd10', 'd12'], answer: 2, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'Which class gains Rage as a class feature?',
        options: ['Paladin', 'Fighter', 'Barbarian', 'Druid'], answer: 2, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'A character\'s Armor Class determines…',
        options: ['How hard they are to hit', 'How far they can move', 'How much damage they deal', 'Their spell save DC'], answer: 0, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'What does rolling a natural 1 on an attack roll always result in?',
        options: ['Critical hit', 'Automatic miss', 'Reroll', 'Double damage'], answer: 1, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'Which die type is NOT used as a damage die for weapons in 5e?',
        options: ['d4', 'd7', 'd6', 'd12'], answer: 1, difficulty: 'easy', gp: 5, penalty: 0 },
      { q: 'What does proficiency bonus apply to?',
        options: ['All rolls', 'Only attack rolls', 'Skills, saves, and attacks you are trained in', 'Hit points'], answer: 2, difficulty: 'easy', gp: 5, penalty: 0 },

      // MEDIUM — 15 GP, −5 on wrong
      { q: 'What school of magic does Fireball belong to?',
        options: ['Conjuration', 'Abjuration', 'Evocation', 'Transmutation'], answer: 2, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'An Opportunity Attack costs…',
        options: ['1 action', '1 reaction', '1 bonus action', 'Nothing'], answer: 1, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'Which monster type are vampires in 5e?',
        options: ['Fiend', 'Celestial', 'Undead', 'Fey'], answer: 2, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'What is the range of the Sending spell?',
        options: ['60 feet', '120 feet', 'Unlimited', '1 mile'], answer: 2, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'Which plane of existence is the home of demons (Tanar\'ri)?',
        options: ['The Nine Hells', 'The Abyss', 'Mechanus', 'Limbo'], answer: 1, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'How long does a short rest take by default in 5e?',
        options: ['1 hour', '8 hours', '10 minutes', '24 hours'], answer: 0, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'The Prone condition causes attacks against you to have…',
        options: ['Disadvantage if attacker is 5 ft away', 'Advantage if attacker is within 5 ft', 'No effect on attacks', 'Advantage from any range'], answer: 1, difficulty: 'medium', gp: 15, penalty: 5 },
      { q: 'What ability score modifier is added to a Paladin\'s spell save DC?',
        options: ['Strength', 'Wisdom', 'Charisma', 'Intelligence'], answer: 2, difficulty: 'medium', gp: 15, penalty: 5 },

      // HARD — 40 GP, −15 on wrong
      { q: 'What is the Challenge Rating of an Adult Red Dragon in 5e?',
        options: ['17', '20', '24', '15'], answer: 0, difficulty: 'hard', gp: 40, penalty: 15 },
      { q: 'How many charges does a fully charged Wand of Magic Missiles have?',
        options: ['5', '10', '7', '3'], answer: 2, difficulty: 'hard', gp: 40, penalty: 15 },
      { q: 'A beholder\'s central eye projects a cone of antimagic. What is the size of that cone?',
        options: ['60 feet', '30 feet', '120 feet', '15 feet'], answer: 0, difficulty: 'hard', gp: 40, penalty: 15 },
      { q: 'Which legendary weapon can only be attuned by a creature of good alignment?',
        options: ['Vorpal Sword', 'Holy Avenger', 'Defender', 'Sword of Sharpness'], answer: 1, difficulty: 'hard', gp: 40, penalty: 15 },
      { q: 'What saving throw does the Hold Person spell require?',
        options: ['Strength', 'Wisdom', 'Constitution', 'Charisma'], answer: 1, difficulty: 'hard', gp: 40, penalty: 15 },
      { q: 'In the Forgotten Realms, what is the name of the Underdark city ruled by drow and home to Lolth\'s faithful?',
        options: ['Menzoberranzan', 'Gracklstugh', 'Blingdenstone', 'Neverlight Grove'], answer: 0, difficulty: 'hard', gp: 40, penalty: 15 },
    ];

    // ═══════════════════════════════════════════════════════
    // SHOP COLOURS — prestige / oracle / bonus from game.html
    // ═══════════════════════════════════════════════════════
    const SHOP_COLORS = [
      { name: 'Oracle',      title: 'Voice of Fate',    style: 'gradient', hex: ['#f3e5f5','#7c4dff'], cost: 50  },
      { name: 'Dragonblood', title: "Wyrm's Chosen",    style: 'gradient', hex: ['#b71c1c','#f39c12'], cost: 100 },
      { name: 'Shadowmeld',  title: 'Dark Sovereign',   style: 'gradient', hex: ['#4a148c','#1a252f'], cost: 200 },
      { name: 'Prismatic',   title: 'Colour Mage',      style: 'gradient', hex: ['#ff6ec7','#5dade2'], cost: 350 },
      { name: 'Eternal',     title: 'Immortal',         style: 'gradient', hex: ['#ffd700','#e8663a'], cost: 500 },
    ];

    // ═══════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════
    let gp = 0;
    let streak = 0;
    let qIndex = 0;
    let shuffled = [];
    let answered = false;
    let timerInterval = null;
    let timerStart = 0;
    const TIMER_MS = 10000;
    let gameData = { totalScore: 0, unlockedColors: [], bonusUnlocked: false, activeColor: null, activeTitle: null };

    // ═══════════════════════════════════════════════════════
    // HELPERS
    // ═══════════════════════════════════════════════════════
    function swatchCSS(col) {
      return col.style === 'gradient'
        ? `background: linear-gradient(90deg, ${col.hex[0]}, ${col.hex[1]});`
        : `background: ${col.hex};`;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function animateGP(delta) {
      gp = Math.max(0, gp + delta);
      const el = document.getElementById('gp-amount');
      el.textContent = gp;
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 200);
    }

    function spawnFloat(text, isGain, anchorEl) {
      const r = anchorEl.getBoundingClientRect();
      const div = document.createElement('div');
      div.className = 'float-gp ' + (isGain ? 'gain' : 'loss');
      div.textContent = text;
      div.style.left = Math.round(r.left + r.width / 2 - 45) + 'px';
      div.style.top  = Math.round(r.top + window.scrollY + 10) + 'px';
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 1300);
    }

    function updateStreakPips() {
      for (let i = 0; i < 5; i++) {
        const pip = document.getElementById('pip-' + i);
        if (i < streak) {
          if (!pip.classList.contains('lit')) {
            pip.classList.add('lit', 'fire');
            setTimeout(() => pip.classList.remove('fire'), 500);
          }
        } else {
          pip.classList.remove('lit', 'fire');
        }
      }
    }

    // ═══════════════════════════════════════════════════════
    // TIMER
    // ═══════════════════════════════════════════════════════
    function startTimer() {
      clearInterval(timerInterval);
      timerStart = Date.now();
      const fill = document.getElementById('timer-fill');
      fill.style.width = '100%';
      fill.classList.remove('danger');
      timerInterval = setInterval(() => {
        if (answered) { clearInterval(timerInterval); return; }
        const elapsed = Date.now() - timerStart;
        const pct = Math.max(0, 1 - elapsed / TIMER_MS);
        fill.style.width = (pct * 100) + '%';
        if (pct < 0.25) fill.classList.add('danger');
        if (pct <= 0) { clearInterval(timerInterval); onTimeout(); }
      }, 50);
    }

    function stopTimer() { clearInterval(timerInterval); }

    // ═══════════════════════════════════════════════════════
    // RENDER QUESTION
    // ═══════════════════════════════════════════════════════
    function renderQuestion() {
      if (qIndex >= shuffled.length) { showEndScreen(); return; }
      answered = false;
      const q = shuffled[qIndex];

      document.getElementById('q-count').textContent = `Question ${qIndex + 1} of ${shuffled.length}`;
      document.getElementById('q-text').textContent = q.q;
      document.getElementById('feedback-banner').textContent = '';
      document.getElementById('feedback-banner').className = 'feedback-banner';
      document.getElementById('q-card').style.display = '';
      document.getElementById('q-card').className = 'q-card';
      document.getElementById('timer-track').style.display = '';
      document.getElementById('end-screen').classList.remove('show');

      const badge = document.getElementById('diff-badge');
      badge.textContent = q.difficulty[0].toUpperCase() + q.difficulty.slice(1) +
        ' · +' + q.gp + ' GP' + (q.penalty ? ' / −' + q.penalty : '');
      badge.className = 'diff-badge ' + q.difficulty;

      const opts = document.getElementById('q-options');
      opts.innerHTML = '';
      ['A','B','C','D'].forEach((lbl, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.innerHTML = `<span class="opt-label">${lbl}</span>${q.options[i]}`;
        btn.onclick = () => onAnswer(i);
        opts.appendChild(btn);
      });

      startTimer();
    }

    // ═══════════════════════════════════════════════════════
    // ANSWER
    // ═══════════════════════════════════════════════════════
    function onAnswer(chosen) {
      if (answered) return;
      answered = true;
      stopTimer();
      const q = shuffled[qIndex];
      const correct = chosen === q.answer;
      const card = document.getElementById('q-card');
      const feedback = document.getElementById('feedback-banner');
      const optBtns = document.getElementById('q-options').children;

      for (let i = 0; i < optBtns.length; i++) {
        optBtns[i].disabled = true;
        if (i === q.answer) optBtns[i].classList.add('correct');
        else if (i === chosen && !correct) optBtns[i].classList.add('wrong');
      }

      if (correct) {
        card.classList.add('correct-flash');
        streak = Math.min(streak + 1, 5);
        const bonus = streak >= 5 ? Math.floor(q.gp * 0.5) : 0;
        const total = q.gp + bonus;
        animateGP(total);
        spawnFloat('+' + total + ' GP' + (bonus ? ' 🔥' : ''), true, card);
        feedback.textContent = bonus
          ? `Correct! +${q.gp} GP + ${bonus} streak bonus!`
          : `Correct! +${q.gp} GP`;
        feedback.className = 'feedback-banner correct-text';
      } else {
        card.classList.add('wrong-flash');
        streak = 0;
        if (q.penalty) animateGP(-q.penalty);
        spawnFloat(q.penalty ? '−' + q.penalty + ' GP' : 'Wrong!', false, card);
        feedback.textContent = q.penalty ? `Wrong. −${q.penalty} GP` : 'Wrong! No penalty this time.';
        feedback.className = 'feedback-banner wrong-text';
      }

      updateStreakPips();
      renderShop();
      setTimeout(() => { qIndex++; renderQuestion(); }, 1600);
    }

    function onTimeout() {
      if (answered) return;
      answered = true;
      const q = shuffled[qIndex];
      const optBtns = document.getElementById('q-options').children;
      for (let i = 0; i < optBtns.length; i++) {
        optBtns[i].disabled = true;
        if (i === q.answer) optBtns[i].classList.add('correct');
      }
      streak = 0;
      updateStreakPips();
      const feedback = document.getElementById('feedback-banner');
      feedback.textContent = "Time's up! No penalty — but no GP either.";
      feedback.className = 'feedback-banner timeout-text';
      setTimeout(() => { qIndex++; renderQuestion(); }, 1600);
    }

    // ═══════════════════════════════════════════════════════
    // END SCREEN
    // ═══════════════════════════════════════════════════════
    function showEndScreen() {
      stopTimer();
      document.getElementById('q-card').style.display = 'none';
      document.getElementById('timer-track').style.display = 'none';
      document.getElementById('end-gp').textContent = gp + ' GP';
      document.getElementById('end-screen').classList.add('show');
    }

    // ═══════════════════════════════════════════════════════
    // SHOP
    // ═══════════════════════════════════════════════════════
    function renderShop() {
      const container = document.getElementById('shop-items');
      container.innerHTML = '';
      SHOP_COLORS.forEach(col => {
        const owned = gameData.unlockedColors.includes(col.name);
        const canBuy = !owned && gp >= col.cost;
        const item = document.createElement('div');
        item.className = 'shop-item';
        item.innerHTML =
          `<div class="shop-item-top">
            <div class="shop-swatch" style="${swatchCSS(col)}"></div>
            <div class="shop-info">
              <div class="shop-name">${col.name}</div>
              <div class="shop-title-text">${col.title}</div>
            </div>
            <div class="shop-cost">${owned ? '—' : col.cost + ' GP'}</div>
          </div>
          <button class="buy-btn${owned ? ' owned' : ''}"
            ${owned ? 'disabled' : !canBuy ? 'disabled' : ''}
            data-name="${col.name}">
            ${owned ? '✓ Owned' : canBuy ? 'Buy' : 'Need ' + col.cost + ' GP'}
          </button>`;
        if (!owned && canBuy) {
          item.querySelector('.buy-btn').onclick = () => buyColor(col);
        }
        container.appendChild(item);
      });
    }

    async function buyColor(col) {
      if (gp < col.cost || gameData.unlockedColors.includes(col.name)) return;
      animateGP(-col.cost);
      gameData.unlockedColors.push(col.name);
      spawnFloat('🎨 ' + col.name + ' unlocked!', true, document.getElementById('shop-panel'));
      renderShop();
      if (!isDM) {
        try {
          const rec = await binGet(BIN_PLAYERS);
          const key = username.toLowerCase();
          if (rec.players && rec.players[key]) {
            const gd = rec.players[key].gameData ||
              { totalScore: 0, unlockedColors: [], bonusUnlocked: false, activeColor: null, activeTitle: null };
            if (!gd.unlockedColors.includes(col.name)) gd.unlockedColors.push(col.name);
            rec.players[key].gameData = gd;
            await binSet(BIN_PLAYERS, rec);
            gameData = gd;
          }
        } catch(e) { console.warn('Shop save failed:', e); }
      }
      renderShop();
    }

    // ═══════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════
    async function loadGameData() {
      // Try remote first
      if (!isDM) {
        try {
          const d = await ScoreStore.getPlayerData(username);
          if (d) gameData = d;
        } catch(e) { console.warn('Load failed:', e); }
      }
      // Merge sessionStorage unlocks in case local is newer
      try {
        const cached = sessionStorage.getItem('dnd-game-data');
        if (cached) {
          const c = JSON.parse(cached);
          (c.unlockedColors || []).forEach(n => {
            if (!gameData.unlockedColors.includes(n)) gameData.unlockedColors.push(n);
          });
        }
      } catch {}
    }

    function startGame() {
      gp = 0;
      streak = 0;
      qIndex = 0;
      shuffled = shuffle(ALL_QUESTIONS);
      document.getElementById('gp-amount').textContent = '0';
      updateStreakPips();
      document.getElementById('end-screen').classList.remove('show');
      document.getElementById('q-card').style.display = '';
      document.getElementById('timer-track').style.display = '';
      renderShop();
      renderQuestion();
    }

    loadGameData().then(startGame);
  </script>
</body>
</html>
